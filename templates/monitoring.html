<!DOCTYPE html>
<html>
<head>
    <title>Groundwater Monitoring</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { margin:0; font-family:Segoe UI, Arial; background:#f4f8fb; }
        .header { background:#0f4c75; color:white; padding:25px; text-align:center; }
        .container { width:90%; margin:30px auto; }

        .filter-box {
            background:white; padding:20px; border-radius:8px;
            box-shadow:0 3px 10px rgba(0,0,0,0.08); margin-bottom:30px;
        }

        .filter-box select, .filter-box input {
            padding:8px; margin-right:10px;
        }

        .btn {
            padding:8px 15px; background:#1b6ca8; color:white;
            border:none; cursor:pointer; border-radius:4px;
        }

        .kpi-grid {
            display:grid; grid-template-columns:repeat(5,1fr);
            gap:20px; margin-bottom:30px;
        }

        .kpi-card {
            background:white; padding:25px; text-align:center;
            border-radius:8px; box-shadow:0 3px 12px rgba(0,0,0,0.08);
        }

        .analytics-grid {
            display:grid; grid-template-columns:1fr 1fr;
            gap:25px;
        }

        .card {
            background:white; padding:20px;
            border-radius:8px; box-shadow:0 3px 12px rgba(0,0,0,0.08);
        }

        #map { height:350px; }

        @media(max-width:1000px){
            .kpi-grid { grid-template-columns:1fr 1fr; }
            .analytics-grid { grid-template-columns:1fr; }
        }
    </style>
</head>

<body>

<div class="header">
    <h2>Groundwater Monitoring Dashboard</h2>
</div>

<div class="container">

    <!-- FILTER -->
    <div class="filter-box">
        <form method="GET" action="/monitoring">

            <select name="district">
                <option value="">Select District</option>
                {% for district in districts %}
                <option value="{{ district }}"
                    {% if district == selected_district %}selected{% endif %}>
                    {{ district }}
                </option>
                {% endfor %}
            </select>

            <select name="station">
                <option value="">Select Station</option>
                {% for station in stations %}
                <option value="{{ station }}"
                    {% if station == selected_station %}selected{% endif %}>
                    {{ station }}
                </option>
                {% endfor %}
            </select>

            <input type="date" name="start_date" value="{{ start_date or '' }}">
            <input type="date" name="end_date" value="{{ end_date or '' }}">

            <button class="btn" type="submit">Apply</button>
            <button class="btn" type="submit" formaction="/download">Download</button>

        </form>
    </div>

    <!-- KPI -->
    <div class="kpi-grid">
        <div class="kpi-card"><h4>Min</h4><p>{{ min_level }} m</p></div>
        <div class="kpi-card"><h4>Max</h4><p>{{ max_level }} m</p></div>
        <div class="kpi-card"><h4>Avg</h4><p>{{ avg_level }} m</p></div>
        <div class="kpi-card"><h4>Latest</h4><p>{{ latest_level }} m</p></div>
        <div class="kpi-card"><h4>Total Records</h4><p>{{ total_records }}</p></div>
    </div>

    <!-- ANALYTICS -->
    <div class="analytics-grid">

        <div class="card">
            <h3>Trend</h3>
            <canvas id="trendChart"></canvas>
        </div>

        <div class="card">
            <h3>Station Location</h3>
            <div id="map"></div>
        </div>

    </div>

</div>

<!-- LEAFLET -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
const latitude = {{ latitude | tojson }};
const longitude = {{ longitude | tojson }};

if(latitude && longitude){
    const map = L.map('map').setView([latitude, longitude], 11);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
        .addTo(map);

    L.marker([latitude, longitude])
        .addTo(map)
        .bindPopup("{{ selected_station or '' }}")
        .openPopup();
}
</script>

<!-- CHART -->
<script>
const labels = {{ dates | tojson }};
const data = {{ water_levels | tojson }};

if(labels.length > 0){
    new Chart(document.getElementById("trendChart"), {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'Water Level (m)',
                data: data,
                borderColor: '#0f4c75',
                backgroundColor: 'rgba(15,76,117,0.1)',
                fill: true,
                tension: 0.3
            }]
        }
    });
}
</script>

</body>
</html>
